<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WTF-16 人格测试 | 你到底是什么品种的离谱</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap');

  :root {
    --bg: #0a0a0f;
    --card: #14141f;
    --card-hover: #1a1a2e;
    --accent: #ff3e6c;
    --accent2: #00e5ff;
    --accent3: #ffd700;
    --accent4: #a855f7;
    --text: #e8e8f0;
    --text-dim: #8888aa;
    --border: #2a2a3e;
    --correct: #22c55e;
    --wrong: #ef4444;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans SC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* 背景动画 */
  .bg-animation {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    overflow: hidden;
    pointer-events: none;
  }

  .bg-animation .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.15;
    animation: float 20s infinite ease-in-out;
  }

  .bg-animation .orb:nth-child(1) {
    width: 400px; height: 400px;
    background: var(--accent);
    top: -100px; left: -100px;
    animation-delay: 0s;
  }

  .bg-animation .orb:nth-child(2) {
    width: 350px; height: 350px;
    background: var(--accent2);
    top: 50%; right: -100px;
    animation-delay: -5s;
  }

  .bg-animation .orb:nth-child(3) {
    width: 300px; height: 300px;
    background: var(--accent4);
    bottom: -100px; left: 30%;
    animation-delay: -10s;
  }

  @keyframes float {
    0%, 100% { transform: translate(0, 0) scale(1); }
    25% { transform: translate(50px, -80px) scale(1.1); }
    50% { transform: translate(-30px, 60px) scale(0.9); }
    75% { transform: translate(70px, 30px) scale(1.05); }
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 720px;
    margin: 0 auto;
    padding: 20px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* ===== 首页 ===== */
  #startPage {
    text-align: center;
    animation: fadeInUp 0.8s ease;
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(40px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .logo {
    font-size: 72px;
    font-weight: 900;
    background: linear-gradient(135deg, var(--accent), var(--accent2), var(--accent3), var(--accent4));
    background-size: 300% 300%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: gradientShift 4s ease infinite;
    margin-bottom: 8px;
    letter-spacing: -2px;
  }

  @keyframes gradientShift {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  .subtitle {
    font-size: 18px;
    color: var(--text-dim);
    margin-bottom: 40px;
    font-weight: 300;
    line-height: 1.8;
  }

  .subtitle span {
    color: var(--accent);
    font-weight: 500;
  }

  .features {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 40px;
    text-align: left;
  }

  .feature-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    font-size: 13px;
    color: var(--text-dim);
    transition: all 0.3s;
  }

  .feature-item:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
  }

  .feature-item .emoji {
    font-size: 24px;
    display: block;
    margin-bottom: 6px;
  }

  .feature-item strong {
    color: var(--text);
    display: block;
    margin-bottom: 4px;
  }

  .btn-start {
    background: linear-gradient(135deg, var(--accent), #ff6b9d);
    color: white;
    border: none;
    padding: 18px 60px;
    font-size: 20px;
    font-weight: 700;
    border-radius: 60px;
    cursor: pointer;
    transition: all 0.3s;
    font-family: inherit;
    position: relative;
    overflow: hidden;
  }

  .btn-start:hover {
    transform: scale(1.05);
    box-shadow: 0 0 40px rgba(255, 62, 108, 0.4);
  }

  .btn-start:active {
    transform: scale(0.98);
  }

  .disclaimer {
    margin-top: 24px;
    font-size: 11px;
    color: var(--text-dim);
    opacity: 0.5;
  }

  /* ===== 答题页 ===== */
  #quizPage {
    display: none;
    width: 100%;
    animation: fadeInUp 0.5s ease;
  }

  .progress-bar-container {
    width: 100%;
    height: 6px;
    background: var(--card);
    border-radius: 3px;
    margin-bottom: 12px;
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 3px;
    transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    width: 0%;
  }

  .progress-text {
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 32px;
    text-align: right;
  }

  .question-number {
    font-size: 13px;
    color: var(--accent);
    font-weight: 700;
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  .question-text {
    font-size: 22px;
    font-weight: 700;
    line-height: 1.6;
    margin-bottom: 32px;
    min-height: 70px;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .option-btn {
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: 16px;
    padding: 18px 24px;
    text-align: left;
    cursor: pointer;
    transition: all 0.3s;
    font-family: inherit;
    color: var(--text);
    font-size: 15px;
    line-height: 1.6;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .option-btn:hover {
    border-color: var(--accent);
    background: var(--card-hover);
    transform: translateX(4px);
  }

  .option-btn.selected {
    border-color: var(--accent);
    background: rgba(255, 62, 108, 0.1);
  }

  .option-label {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: rgba(255, 255, 255, 0.05);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 14px;
    color: var(--accent);
    flex-shrink: 0;
    transition: all 0.3s;
  }

  .option-btn:hover .option-label,
  .option-btn.selected .option-label {
    background: var(--accent);
    color: white;
  }

  .btn-prev {
    margin-top: 28px;
    width: 100%;
    background: var(--card);
    border: 2px solid var(--border);
    color: var(--text-dim);
    padding: 16px;
    font-size: 16px;
    font-weight: 600;
    border-radius: 14px;
    cursor: pointer;
    transition: all 0.3s;
    font-family: inherit;
  }

  .btn-prev:hover {
    border-color: var(--accent4);
    background: rgba(168, 85, 247, 0.1);
    color: var(--text);
  }

  .btn-prev.hidden {
    display: none;
  }

  .btn-next {
    margin-top: 0;
    width: 100%;
    background: var(--card);
    border: 2px solid var(--border);
    color: var(--text);
    padding: 16px;
    font-size: 16px;
    font-weight: 600;
    border-radius: 14px;
    cursor: pointer;
    transition: all 0.3s;
    font-family: inherit;
    opacity: 0.4;
    pointer-events: none;
  }

  .btn-next.active {
    opacity: 1;
    pointer-events: all;
  }

  .btn-next.active:hover {
    border-color: var(--accent2);
    background: rgba(0, 229, 255, 0.1);
  }

  /* ===== 结果页 ===== */
  #resultPage {
    display: none;
    width: 100%;
    animation: fadeInUp 0.8s ease;
    text-align: center;
  }

  .result-type-code {
    font-size: 64px;
    font-weight: 900;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 4px;
    letter-spacing: 6px;
  }

  .result-type-name {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 8px;
  }

  .result-tagline {
    font-size: 15px;
    color: var(--accent);
    margin-bottom: 32px;
    font-weight: 500;
  }

  .result-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px;
    text-align: left;
    margin-bottom: 20px;
  }

  .result-card h3 {
    font-size: 16px;
    color: var(--accent2);
    margin-bottom: 16px;
    font-weight: 700;
  }

  .result-card p {
    font-size: 15px;
    line-height: 1.8;
    color: var(--text-dim);
    margin-bottom: 12px;
  }

  .result-card p:last-child {
    margin-bottom: 0;
  }

  .dimension-bars {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 20px;
  }

  .dimension-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    text-align: center;
  }

  .dimension-label {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  .dimension-letters {
    font-size: 20px;
    font-weight: 900;
    margin-bottom: 8px;
  }

  .dimension-bar {
    height: 6px;
    background: rgba(255,255,255,0.05);
    border-radius: 3px;
    overflow: hidden;
    margin-top: 8px;
  }

  .dimension-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 1s ease;
  }

  .compatibility {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 20px;
    text-align: left;
  }

  .compatibility h3 {
    font-size: 16px;
    color: var(--accent3);
    margin-bottom: 16px;
    font-weight: 700;
  }

  .compat-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
  }

  .compat-item:last-child {
    border-bottom: none;
  }

  .compat-type {
    font-weight: 700;
    color: var(--text);
  }

  .compat-desc {
    color: var(--text-dim);
    font-size: 13px;
  }

  .btn-restart {
    background: linear-gradient(135deg, var(--accent4), #c084fc);
    color: white;
    border: none;
    padding: 16px 48px;
    font-size: 16px;
    font-weight: 700;
    border-radius: 60px;
    cursor: pointer;
    transition: all 0.3s;
    font-family: inherit;
    margin-top: 12px;
  }

  .btn-restart:hover {
    transform: scale(1.05);
    box-shadow: 0 0 30px rgba(168, 85, 247, 0.4);
  }

  .share-section {
    margin-top: 20px;
    margin-bottom: 20px;
  }

  .share-section p {
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 12px;
  }

  .btn-share {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 32px;
    font-size: 14px;
    font-weight: 600;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.3s;
    font-family: inherit;
    margin: 0 6px;
  }

  .btn-share:hover {
    border-color: var(--accent3);
    background: rgba(255, 215, 0, 0.1);
  }

  /* ===== 加载动画 ===== */
  .loading-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: var(--bg);
    z-index: 100;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 20px;
  }

  .loading-overlay.show {
    display: flex;
  }

  .loading-text {
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
    animation: pulse 1.5s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .loading-dots {
    display: flex;
    gap: 8px;
  }

  .loading-dots span {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--accent);
    animation: bounce 1.4s infinite ease-in-out both;
  }

  .loading-dots span:nth-child(1) { animation-delay: -0.32s; }
  .loading-dots span:nth-child(2) { animation-delay: -0.16s; }
  .loading-dots span:nth-child(3) { animation-delay: 0; }

  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0); }
    40% { transform: scale(1); }
  }

  /* 响应式 */
  @media (max-width: 600px) {
    .logo { font-size: 48px; }
    .features { grid-template-columns: 1fr; }
    .question-text { font-size: 18px; }
    .result-type-code { font-size: 48px; }
    .result-type-name { font-size: 22px; }
    .dimension-bars { grid-template-columns: 1fr; }
    .container { padding: 16px; }
  }

  /* 隐藏滚动条美化 */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
</style>
</head>
<body>

<div class="bg-animation">
  <div class="orb"></div>
  <div class="orb"></div>
  <div class="orb"></div>
</div>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-dots">
    <span></span><span></span><span></span>
  </div>
  <div class="loading-text">正在分析你的离谱程度...</div>
</div>

<div class="container">

  <!-- ===== 首页 ===== -->
  <div id="startPage">
    <div class="logo">WTF-16</div>
    <div class="subtitle">
      <span>全球首个</span>让你做完怀疑人生的性格测试<br>
      比 MBTI 更离谱 · 比 星座 更抽象 · 比 算命 更不靠谱
    </div>
    <div class="features">
      <div class="feature-item">
        <span class="emoji">🧠</span>
        <strong>科学依据</strong>
        毫无科学依据，纯靠瞎编
      </div>
      <div class="feature-item">
        <span class="emoji">🎯</span>
        <strong>精准度</strong>
        准确率约等于抛硬币
      </div>
      <div class="feature-item">
        <span class="emoji">💀</span>
        <strong>副作用</strong>
        可能导致自我认知崩塌
      </div>
      <div class="feature-item">
        <span class="emoji">🤡</span>
        <strong>适用人群</strong>
        所有人类及部分猫
      </div>
    </div>
    <button class="btn-start" onclick="startQuiz()">开始怀疑人生</button>
    <div class="disclaimer">⚠️ 本测试纯属娱乐，如有雷同，说明你真的很离谱</div>
  </div>

  <!-- ===== 答题页 ===== -->
  <div id="quizPage">
    <div class="progress-bar-container">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <div class="progress-text" id="progressText">1 / 24</div>
    <div class="question-number" id="questionNumber">QUESTION 01</div>
    <div class="question-text" id="questionText"></div>
    <div class="options" id="optionsContainer"></div>
    <button class="btn-prev hidden" id="btnPrev" onclick="prevQuestion()">← 上一题</button>
    <button class="btn-next" id="btnNext" onclick="nextQuestion()">下一题 →</button>
  </div>

  <!-- ===== 结果页 ===== -->
  <div id="resultPage">
    <div class="result-type-code" id="resultCode"></div>
    <div class="result-type-name" id="resultName"></div>
    <div class="result-tagline" id="resultTagline"></div>

    <div class="dimension-bars" id="dimensionBars"></div>

    <div class="result-card">
      <h3>📋 你的离谱鉴定报告</h3>
      <div id="resultDescription"></div>
    </div>

    <div class="result-card">
      <h3>⚡ 你的超能力</h3>
      <div id="resultPower"></div>
    </div>

    <div class="result-card">
      <h3>🚫 你的致命弱点</h3>
      <div id="resultWeakness"></div>
    </div>

    <div class="compatibility" id="compatibilitySection">
      <h3>💕 人际关系指南</h3>
      <div id="compatibilityContent"></div>
    </div>

    <div class="share-section">
      <p>👇 把你的离谱程度分享给朋友</p>
      <button class="btn-share" onclick="copyResult()">📋 复制结果</button>
      <button class="btn-share" onclick="restartQuiz()">🔄 重新测试</button>
    </div>

    <button class="btn-restart" onclick="restartQuiz()">再来一次，我不信</button>
  </div>

</div>

<script>
// ===== 维度定义 =====
// 维度1: S(摆烂型) vs D(奋斗型) — 你面对人生的态度
// 维度2: H(幻觉型) vs R(现实型) — 你和现实的关系
// 维度3: C(抽象型) vs N(正常型) — 你的精神状态
// 维度4: G(社恐型) vs E(社牛型) — 你的社交模式

const DIMENSIONS = ['SD', 'HR', 'CN', 'GE'];

// ===== 题目数据 =====
const questions = [
  {
    text: "闹钟响了，你的第一反应是？",
    dim: "SD",
    options: [
      { text: "关掉闹钟，和床板融为一体，这是基本人权", score: "S" },
      { text: "挣扎3秒后继续睡，但心里充满愧疚", score: "S" },
      { text: "一跃而起！新的一天充满希望！（然后5分钟后困了）", score: "D" },
      { text: "闹钟？我生物钟比瑞士钟表还准，6:00准时睁眼", score: "D" }
    ]
  },
  {
    text: "朋友约你周末出去玩，你的内心OS是？",
    dim: "GE",
    options: [
      { text: "好耶！去哪？几点？穿什么？我马上到！", score: "E" },
      { text: "可以啊，到时候看", score: "E" },
      { text: "已读不回，假装没看到，等对方忘记", score: "G" },
      { text: "内心疯狂拒绝，嘴上说'好啊好啊'，然后找借口鸽掉", score: "G" }
    ]
  },
  {
    text: "你在超市结账时发现前面有一个人插队，你会？",
    dim: "CN",
    options: [
      { text: "大声说'不好意思，队尾在后面'，维护宇宙秩序", score: "N" },
      { text: "在心里骂了对方祖宗十八代，表面上微笑着让位", score: "N" },
      { text: "开始思考：插队是不是也是一种人生哲学？", score: "C" },
      { text: "加入他，两个人一起插队，团结就是力量", score: "C" }
    ]
  },
  {
    text: "深夜12点，你突然想起了一件三年前的尴尬事，你会？",
    dim: "HR",
    options: [
      { text: "在床上翻来覆去，恨不得穿越回去给自己一巴掌", score: "R" },
      { text: "叹口气，翻个身，强迫自己想点别的", score: "R" },
      { text: "开始编造一个平行宇宙，在那个宇宙里那件事根本没发生", score: "H" },
      { text: "尴尬？不存在的，那是我高光时刻", score: "H" }
    ]
  },
  {
    text: "领导/老师突然说'你来回答一下这个问题'，你的反应是？",
    dim: "GE",
    options: [
      { text: "淡定站起来，流利回答，顺便拓展一下", score: "E" },
      { text: "虽然不会，但自信地胡说八道，居然蒙对了", score: "E" },
      { text: "瞬间石化，大脑蓝屏，灵魂出窍", score: "G" },
      { text: "低下头，疯狂缩小存在感，希望点名系统出bug", score: "G" }
    ]
  },
  {
    text: "你的手机只剩1%电了，你会？",
    dim: "SD",
    options: [
      { text: "淡定地继续刷手机，直到它自己关机，这是命运", score: "S" },
      { text: "到处借充电器，但借到之后又忘了充", score: "S" },
      { text: "立刻冲向充电器，一秒都不能浪费", score: "D" },
      { text: "我手机永远不低于20%，我有充电焦虑症", score: "D" }
    ]

// ===== 状态管理 =====
let currentQuestion = 0;
let scores = { S: 0, D: 0, H: 0, R: 0, C: 0, N: 0, G: 0, E: 0 };
let selectedOption = null;
let answerHistory = []; // 记录每题的选择

// ===== 页面切换 =====
function showPage(pageId) {
  document.getElementById('startPage').style.display = 'none';
  document.getElementById('quizPage').style.display = 'none';
  document.getElementById('resultPage').style.display = 'none';
  document.getElementById(pageId).style.display = 'block';
}

// ===== 开始测试 =====
function startQuiz() {
  currentQuestion = 0;
  scores = { S: 0, D: 0, H: 0, R: 0, C: 0, N: 0, G: 0, E: 0 };
  answerHistory = [];
  showPage('quizPage');
  renderQuestion();
}

// ===== 渲染题目 =====
function renderQuestion() {
  const q = questions[currentQuestion];
  const total = questions.length;

  document.getElementById('progressBar').style.width = ((currentQuestion) / total * 100) + '%';
  document.getElementById('progressText').textContent = `${currentQuestion + 1} / ${total}`;
  document.getElementById('questionNumber').textContent = `QUESTION ${String(currentQuestion + 1).padStart(2, '0')}`;
  document.getElementById('questionText').textContent = q.text;

  const container = document.getElementById('optionsContainer');
  container.innerHTML = '';

  const labels = ['A', 'B', 'C', 'D'];
  const previousAnswer = answerHistory[currentQuestion] || null;

  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    if (previousAnswer === opt.score) {
      btn.classList.add('selected');
    }
    btn.innerHTML = `<span class="option-label">${labels[i]}</span><span>${opt.text}</span>`;
    btn.onclick = () => selectOption(btn, opt.score);
    container.appendChild(btn);
  });

  selectedOption = previousAnswer;

  // 上一题按钮：第一题时隐藏
  const btnPrev = document.getElementById('btnPrev');
  if (currentQuestion === 0) {
    btnPrev.classList.add('hidden');
  } else {
    btnPrev.classList.remove('hidden');
  }

  // 下一题按钮
  const btnNext = document.getElementById('btnNext');
  if (selectedOption) {
    btnNext.classList.add('active');
  } else {
    btnNext.classList.remove('active');
  }
  btnNext.textContent = currentQuestion === total - 1 ? '查看结果 →' : '下一题 →';

  // 动画
  document.getElementById('quizPage').style.animation = 'none';
  document.getElementById('quizPage').offsetHeight;
  document.getElementById('quizPage').style.animation = 'fadeInUp 0.5s ease';
}

// ===== 选择选项 =====
function selectOption(btn, score) {
  document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedOption = score;
  document.getElementById('btnNext').classList.add('active');
}

// ===== 下一题 =====
function nextQuestion() {
  if (!selectedOption) return;

  // 如果之前有答案，先扣掉旧分数
  if (answerHistory[currentQuestion]) {
    scores[answerHistory[currentQuestion]]--;
  }

  // 保存新答案并加分
  answerHistory[currentQuestion] = selectedOption;
  scores[selectedOption]++;

  currentQuestion++;
  if (currentQuestion >= questions.length) {
    showLoading();
  } else {
    renderQuestion();
  }
}

// ===== 上一题 =====
function prevQuestion() {
  if (currentQuestion <= 0) return;

  // 如果当前题有已保存的答案（不是本次新选的），需要扣分
  if (answerHistory[currentQuestion]) {
    scores[answerHistory[currentQuestion]]--;
    answerHistory[currentQuestion] = null;
  }

  currentQuestion--;
  renderQuestion();
}

// ===== 加载动画 =====
function showLoading() {
  const loadingTexts = [
    '正在分析你的离谱程度...',
    '正在计算你的精神状态...',
    '正在对比你的抽象指数...',
    '正在生成你的离谱鉴定报告...',
    '正在和宇宙确认你的人格类型...',
    '马上就好，比你的人生规划还快...'
  ];

  const overlay = document.getElementById('loadingOverlay');
  overlay.classList.add('show');

  let textIndex = 0;
  const textEl = overlay.querySelector('.loading-text');
  const interval = setInterval(() => {
    textIndex++;
    if (textIndex < loadingTexts.length) {
      textEl.textContent = loadingTexts[textIndex];
    }
  }, 500);

  setTimeout(() => {
    clearInterval(interval);
    overlay.classList.remove('show');
    showResult();
  }, 3500);
}

// ===== 计算并显示结果 =====
function showResult() {
  const typeCode = getPersonalityType();
  const type = types[typeCode];

  if (!type) {
    // fallback
    const fallbackCode = "SCHG";
    showResultPage(fallbackCode, types[fallbackCode]);
    return;
  }

  showResultPage(typeCode, type);
}

function getPersonalityType() {
  const d1 = scores.S >= scores.D ? 'S' : 'D';
  const d2 = scores.H >= scores.R ? 'H' : 'R';
  const d3 = scores.C >= scores.N ? 'C' : 'N';
  const d4 = scores.G >= scores.E ? 'G' : 'E';

  const code = d1 + d2 + d3 + d4;

  // Handle the space-in-name types
  if (types[code]) return code;

  // Try without spaces
  const cleanCode = code.replace(/\s/g, '');
  if (types[cleanCode]) return cleanCode;

  // Find closest match
  const allCodes = Object.keys(types);
  let bestMatch = allCodes[0];
  let bestScore = 0;

  allCodes.forEach(tc => {
    let matchScore = 0;
    const clean = tc.replace(/\s/g, '');
    if (clean[0] === d1) matchScore++;
    if (clean[1] === d2) matchScore++;
    if (clean[2] === d3) matchScore++;
    if (clean[3] === d4) matchScore++;
    if (matchScore > bestScore) {
      bestScore = matchScore;
      bestMatch = tc;
    }
  });

  return bestMatch;
}

function showResultPage(code, type) {
  document.getElementById('resultCode').textContent = code.replace(/\s/g, '');
  document.getElementById('resultName').textContent = type.name;
  document.getElementById('resultTagline').textContent = `"${type.tagline}"`;

  // 维度条
  const dimBars = document.getElementById('dimensionBars');
  const dimInfo = [
    { label: '摆烂 vs 奋斗', left: 'S 摆烂', right: 'D 奋斗', leftScore: scores.S, rightScore: scores.D, color: '#ff3e6c' },
    { label: '幻觉 vs 现实', left: 'H 幻觉', right: 'R 现实', leftScore: scores.H, rightScore: scores.R, color: '#00e5ff' },
    { label: '抽象 vs 正常', left: 'C 抽象', right: 'N 正常', leftScore: scores.C, rightScore: scores.N, color: '#ffd700' },
    { label: '社恐 vs 社牛', left: 'G 社恐', right: 'E 社牛', leftScore: scores.G, rightScore: scores.E, color: '#a855f7' }
  ];

  dimBars.innerHTML = dimInfo.map(d => {
    const total = d.leftScore + d.rightScore;
    const pct = total > 0 ? Math.round(d.leftScore / total * 100) : 50;
    return `
      <div class="dimension-item">
        <div class="dimension-label">${d.label}</div>
        <div class="dimension-letters" style="color: ${d.color}">${d.leftScore >= d.rightScore ? d.left : d.right}</div>
        <div style="font-size:12px;color:var(--text-dim)">${d.leftScore} vs ${d.rightScore}</div>
        <div class="dimension-bar">
          <div class="dimension-fill" style="width:${pct}%;background:${d.color}"></div>
        </div>
      </div>
    `;
  }).join('');

  // 描述
  document.getElementById('resultDescription').innerHTML = `<p>${type.desc}</p>`;
  document.getElementById('resultPower').innerHTML = `<p>${type.power}</p>`;
  document.getElementById('resultWeakness').innerHTML = `<p>${type.weakness}</p>`;

  // 兼容性
  const compatHTML = `
    <div class="compat-item">
      <div>
        <span class="compat-type">💕 最佳拍档：${type.compat.best}</span>
        <div class="compat-desc">${type.compat.bestDesc}</div>
      </div>
    </div>
    <div class="compat-item">
      <div>
        <span class="compat-type">💥 灾难组合：${type.compat.worst}</span>
        <div class="compat-desc">${type.compat.worstDesc}</div>
      </div>
    </div>
  `;
  document.getElementById('compatibilityContent').innerHTML = compatHTML;

  showPage('resultPage');
  window.scrollTo(0, 0);
}

// ===== 复制结果 =====
function copyResult() {
  const code = document.getElementById('resultCode').textContent;
  const name = document.getElementById('resultName').textContent;
  const tagline = document.getElementById('resultTagline').textContent;

  const text = `【WTF-16 人格测试结果】\n🧬 类型：${code} - ${name}\n💬 ${tagline}\n\n来测测你是什么品种的离谱 👉 [WTF-16人格测试]`;

  navigator.clipboard.writeText(text).then(() => {
    const btn = event.target;
    btn.textContent = '✅ 已复制！';
    setTimeout(() => { btn.textContent = '📋 复制结果'; }, 2000);
  }).catch(() => {
    // fallback
    const textarea = document.createElement('textarea');
    textarea.value = text;
    document.body.appendChild(textarea);
    textarea.select();
    document.execCommand('copy');
    document.body.removeChild(textarea);
    const btn = event.target;
    btn.textContent = '✅ 已复制！';
    setTimeout(() => { btn.textContent = '📋 复制结果'; }, 2000);
  });
}

// ===== 重新测试 =====
function restartQuiz() {
  showPage('startPage');
  window.scrollTo(0, 0);
}
